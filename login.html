<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 450px;
            width: 90%;
            margin: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #4CAF50;
            border-bottom: 3px solid #4CAF50;
        }

        .tab.buyer-tab.active {
            color: #2196F3;
            border-bottom-color: #2196F3;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .login-btn.buyer-btn {
            background: #2196F3;
        }

        .register-link {
            text-align: center;
            color: #666;
        }

        .register-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 FarmConnect</h1>
            <a href="index.html">← Back to Home</a>
        </div>

        <div class="login-card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('farmer')">👨‍🌾 Farmer</div>
                <div class="tab buyer-tab" onclick="switchTab('buyer')">🛒 Buyer</div>
            </div>

            <div id="message" class="message"></div>

            <div id="farmerForm" class="form-container active">
                <form onsubmit="handleLogin(event, 'farmer')">
                    <div class="form-group">
                        <label for="farmerEmail">Email</label>
                        <input type="email" id="farmerEmail" placeholder="farmer@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="farmerPassword">Password</label>
                        <input type="password" id="farmerPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="login-btn">Login as Farmer</button>
                    <div class="register-link">
                        Don't have an account? <a href="registration.html">Register as Farmer</a>
                    </div>
                </form>
            </div>

            <div id="buyerForm" class="form-container">
                <form onsubmit="handleLogin(event, 'buyer')">
                    <div class="form-group">
                        <label for="buyerEmail">Email</label>
                        <input type="email" id="buyerEmail" placeholder="buyer@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="buyerPassword">Password</label>
                        <input type="password" id="buyerPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="login-btn buyer-btn">Login as Buyer</button>
                    <div class="register-link">
                        Don't have an account? <a href="registration.html">Register as Buyer</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const farmerForm = document.getElementById('farmerForm');
            const buyerForm = document.getElementById('buyerForm');
            
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'farmer') {
                tabs[0].classList.add('active');
                farmerForm.classList.add('active');
                buyerForm.classList.remove('active');
            } else {
                tabs[1].classList.add('active');
                buyerForm.classList.add('active');
                farmerForm.classList.remove('active');
            }
        }

        function handleLogin(event, type) {
            event.preventDefault();
            
            const email = document.getElementById(`${type}Email`).value;
            const password = document.getElementById(`${type}Password`).value;
            
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Authority login
            if (email === 'admin@farmconnect.com' && password === 'admin123') {
                localStorage.setItem('currentUser', JSON.stringify({
                    id: 'authority',
                    name: 'Administrator',
                    email: email,
                    type: 'authority',
                    status: 'approved'
                }));
                window.location.href = 'dashboard.html';
                return;
            }
            
            const user = users.find(u => u.email === email && u.password === password && u.type === type);
            
            if (!user) {
                showMessage('Invalid email or password!', 'error');
                return;
            }
            
            if (user.status !== 'approved') {
                showMessage('Your account is pending approval from authority!', 'error');
                return;
            }
            
            if (!user.subscription || !user.subscription.active) {
                showMessage('Your subscription has expired. Please renew.', 'error');
                setTimeout(() => {
                    localStorage.setItem('pendingUser', JSON.stringify(user));
                    window.location.href = 'payment.html?renew=true';
                }, 2000);
                return;
            }
            
            const expiryDate = new Date(user.subscription.expiryDate);
            if (expiryDate < new Date()) {
                user.subscription.active = false;
                showMessage('Your subscription has expired. Please renew.', 'error');
                setTimeout(() => {
                    localStorage.setItem('pendingUser', JSON.stringify(user));
                    window.location.href = 'payment.html?renew=true';
                }, 2000);
                return;
            }
            
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type === 'error' ? 'error-message' : 'success-message'}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
